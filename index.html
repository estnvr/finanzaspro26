<span class="badge-pro" id="update-badge">Actualizado: </span>
<script>
  const monthNames = [
    'enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
    'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'
  ];
  const date = new Date();
  document.getElementById('update-badge').textContent += ` ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
</script>
